<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenDraw Minimal Prototype v5.0</title>
  <style>
    /* === CSS Reset === */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* === Design Tokens === */
    :root {
      /* Colors */
      --bg: #fafbfc;
      --bg-subtle: #f4f5f7;
      --bg-elevated: #ffffff;
      --text: #1a1d23;
      --text-secondary: #5a5f6b;
      --text-tertiary: #8e939f;
      --border: #e2e5ea;
      --border-subtle: #eef0f4;
      --primary: #4f6ef7;
      --primary-hover: #3b5ae0;
      --primary-subtle: rgba(79, 110, 247, 0.08);
      
      /* Spacing */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      
      /* Border Radius */
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --radius-full: 9999px;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.08);
      
      /* Typography */
      --font-sans: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      /* Animation */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-normal: 200ms;
      --duration-slow: 300ms;
    }

    /* Dark Mode */
    [data-theme="dark"] {
      --bg: #0c0d0f;
      --bg-subtle: #141519;
      --bg-elevated: #1a1c22;
      --text: #e8eaed;
      --text-secondary: #9ca0ab;
      --text-tertiary: #6b7080;
      --border: #2e3038;
      --border-subtle: #23252b;
      --primary: #6b87ff;
      --primary-hover: #85a0ff;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    /* === Base Styles === */
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* === Layout === */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* === Header === */
    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(12px);
      background: rgba(250, 251, 252, 0.8);
      border-bottom: 1px solid var(--border-subtle);
      padding: var(--space-4) 0;
    }

    .dark .header {
      background: rgba(12, 13, 15, 0.8);
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(79, 110, 247, 0.25);
    }

    .logo-text h1 {
      font-size: 1.125rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    /* === Main Content === */
    .main {
      padding: var(--space-16) 0;
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* === Draw Button === */
    .draw-button-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-8);
    }

    .draw-button {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      transition: transform var(--duration-normal) var(--ease-out),
                  box-shadow var(--duration-normal) var(--ease-out);
      
      /* Pulse animation */
      animation: pulse 2s ease-in-out infinite;
    }

    .draw-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 48px rgba(79, 110, 247, 0.4);
    }

    .draw-button:active {
      transform: scale(0.98);
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: var(--shadow-lg), 0 0 0 0 rgba(79, 110, 247, 0.2);
      }
      50% {
        box-shadow: var(--shadow-lg), 0 0 0 20px rgba(79, 110, 247, 0);
      }
    }

    /* === Result Display === */
    .result-display {
      text-align: center;
      animation: fadeInUp 600ms var(--ease-out);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-number {
      font-size: clamp(3rem, 8vw, 4.5rem);
      font-weight: 700;
      color: var(--primary);
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
    }

    .result-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: var(--space-2);
    }

    /* === Settings Panel === */
    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 420px;
      height: 100vh;
      background: var(--bg-elevated);
      border-left: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-lg);
      padding: var(--space-6);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform var(--duration-slow) var(--ease-out);
    }

    .settings-panel.open {
      transform: translateX(0);
    }

    /* === Card === */
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
    }

    /* === Input === */
    .input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      color: var(--text);
      transition: border-color var(--duration-fast) var(--ease-out),
                  box-shadow var(--duration-fast) var(--ease-out);
    }

    .input:hover {
      border-color: var(--border);
    }

    .input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-subtle);
    }

    /* === Button Variants === */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(79, 110, 247, 0.25);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(79, 110, 247, 0.35);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-ghost:hover {
      background: var(--bg-subtle);
      color: var(--text);
    }

    /* === Responsive === */
    @media (max-width: 640px) {
      .draw-button {
        width: 140px;
        height: 140px;
        font-size: 1rem;
      }
      
      .result-number {
        font-size: clamp(2rem, 12vw, 3rem);
      }
      
      .settings-panel {
        width: 100%;
      }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .draw-button {
        width: 160px;
        height: 160px;
      }
    }

    /* === Dark Mode Toggle === */
    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: var(--bg-subtle);
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .theme-toggle:hover {
      background: var(--border-subtle);
    }

    /* === Section === */
    .section {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    /* === History List === */
    .history-list {
      width: 100%;
      max-width: 600px;
      margin-top: var(--space-12);
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--duration-fast) var(--ease-out);
    }

    .history-item:hover {
      background: var(--bg-subtle);
    }

    .history-number {
      font-size: 1.125rem;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--primary);
    }

    .history-time {
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    /* === Footer === */
    .footer {
      text-align: center;
      padding: var(--space-8) 0;
      color: var(--text-tertiary);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>ZenDraw</h1>
          <p>禅抽 v5.0</p>
        </div>
      </div>
      
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
          <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="btn btn-ghost" onclick="toggleSettings()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          设置
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <div class="section">
      <!-- Welcome State -->
      <div class="result-display" id="welcome-state">
        <div style="margin-bottom: 2rem;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" style="opacity: 0.6;">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem;">准备开始抽签</h2>
        <p style="color: var(--text-secondary); font-size: 0.875rem;">点击按钮或按空格键开始</p>
      </div>

      <!-- Draw Button -->
      <div class="draw-button-wrapper">
        <button class="draw-button" onclick="startDraw()">
          <span>开始抽签</span>
        </button>
        
        <!-- Result (Hidden by default) -->
        <div class="result-display" id="result-state" style="display: none;">
          <div class="result-number" id="result-number">42</div>
          <div class="result-label">抽签结果</div>
        </div>
      </div>

      <!-- Hint -->
      <p style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-tertiary); text-align: center;">
        按 <kbd style="padding: 2px 6px; background: var(--bg-subtle); border-radius: 4px; font-family: var(--font-mono);">空格键</kbd> 开始/停止
      </p>
    </div>

    <!-- History List -->
    <div class="history-list">
      <h3 style="font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 1rem; padding: 0 1rem;">
        历史记录
      </h3>
      <div class="history-item">
        <div>
          <div class="history-number">42</div>
          <div class="history-time">2026-06-30 16:08</div>
        </div>
        <button class="btn btn-ghost" style="padding: 0.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="history-item">
        <div>
          <div class="history-number">17</div>
          <div class="history-time">2026-06-30 16:05</div>
        </div>
        <button class="btn btn-ghost" style="padding: 0.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settings-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2 style="font-size: 1.125rem; font-weight: 600;">设置</h2>
      <button class="btn btn-ghost" onclick="toggleSettings()" style="padding: 0.5rem;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    
    <div class="card" style="margin-bottom: 1rem;">
      <h3 style="font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem;">抽取范围</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div>
          <label style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block;">最小值</label>
          <input type="number" class="input" value="1" />
        </div>
        <div>
          <label style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block;">最大值</label>
          <input type="number" class="input" value="100" />
        </div>
      </div>
    </div>
    
    <div class="card">
      <h3 style="font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem;">抽取个数</h3>
      <input type="range" min="1" max="10" value="1" style="width: 100%;" />
      <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-tertiary); margin-top: 0.5rem;">
        <span>1</span>
        <span>10</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>ZenDraw v5.0 · 极简 · 精准 · 禅意</p>
  </footer>

  <script>
    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      
      if (currentTheme === 'dark') {
        html.removeAttribute('data-theme');
        document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      } else {
        html.setAttribute('data-theme', 'dark');
        document.getElementById('theme-icon').innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      }
    }

    // Settings Panel Toggle
    function toggleSettings() {
      const panel = document.getElementById('settings-panel');
      panel.classList.toggle('open');
    }

    // Draw Simulation
    let isDrawing = false;
    let drawInterval;

    function startDraw() {
      if (isDrawing) {
        stopDraw();
        return;
      }

      isDrawing = true;
      const button = document.querySelector('.draw-button');
      button.textContent = '停止';
      button.style.background = '#c9374b';

      // Simulate rolling number
      const resultNumber = document.getElementById('result-number');
      drawInterval = setInterval(() => {
        resultNumber.textContent = Math.floor(Math.random() * 100) + 1;
      }, 80);
    }

    function stopDraw() {
      isDrawing = false;
      clearInterval(drawInterval);

      const button = document.querySelector('.draw-button');
      button.textContent = '开始抽签';
      button.style.background = '';

      // Show result
      document.getElementById('welcome-state').style.display = 'none';
      document.getElementById('result-state').style.display = 'block';
    }

    // Keyboard Shortcut
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
        e.preventDefault();
        startDraw();
      }
    });
  </script>
</body>
</html>
