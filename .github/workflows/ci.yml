# CI 工作流 — 代码质量检查
# 每次 PR 提交时自动运行

name: CI - Code Quality

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 TypeScript 类型检查
        run: npm run type-check

      - name: 🧹 ESLint 检查
        run: npm run lint -- --max-warnings=20

      - name: 🏗️ 构建检查
        run: npm run build

  security-check:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔒 npm 安全审计
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: 🔍 依赖漏洞扫描
        uses: actions/dependency-review@v4
        if: github.event_name == 'pull_request'
